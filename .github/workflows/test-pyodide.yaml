# Copied from NumPy https://github.com/numpy/numpy/blob/d4e5fafa28f4198c535e64ec18584f9ffd180d4d/.github/workflows/emscripten.yml

name: Test Pyodide

on: [push, pull_request, merge_group]

permissions:
  contents: read # to fetch code (actions/checkout)

env:
  FORCE_COLOR: 3
  CCACHE_DIR: /tmp/ccache

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-wasm-emscripten:
    name: Pyodide test
    runs-on: ubuntu-22.04
    # To enable this workflow on a fork, comment out:
    # if: github.repository == 'scikit-image/scikit-image'
    steps:
      - name: Checkout scikit-image
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install ccache
        run: |
          sudo apt-get install -y ccache
          mkdir -p /tmp/ccache
          ccache --max-size=500M

      - name: Cache ccache output
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-pyodide-ccache-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-pyodide-ccache-

      - name: Cache cibuildwheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.cache/cibuildwheel
          key: ${{ runner.os }}-cibuildwheel-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-cibuildwheel-

      - name: Reset ccache stats
        run: ccache -z

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_PLATFORM: pyodide
          CIBW_BUILD: cp313-pyodide_wasm32
          CIBW_ENVIRONMENT: "CCACHE_DIR=/tmp/ccache EM_COMPILER_WRAPPER=ccache CCACHE_COMPILERCHECK=content"
          CIBW_BEFORE_BUILD: python3 {project}/.github/scripts/setup_emscripten_ccache.py

      - name: Show ccache stats
        run: ccache -s
