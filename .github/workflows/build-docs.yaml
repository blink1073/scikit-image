on:
  push:
    # branches:
    #   - main

name: Build docs

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # for Git to git push
    name: Build docs
    runs-on: ubuntu-latest
    env:
      CCACHE_BASEDIR: "${{ github.workspace }}"
      CCACHE_DIR: "${{ github.workspace }}/.ccache"
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 400M
      CCACHE_SLOPPINESS: "pch_defines,time_macros"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements/*.txt"
      - name: Install dependencies
        run: |
          sudo apt install optipng ccache
          sudo /usr/sbin/update-ccache-symlinks
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          python -m pip install --upgrade pip
          python -m pip install -r requirements/build.txt
          python -m pip install -r requirements/default.txt
          python -m pip install -r requirements/optional.txt
          python -m pip install -r requirements/docs.txt
      - name: Restore/save ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-docs-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-docs-
      - name: Zero ccache stats
        run: ccache --zero-stats
      - name: Install package
        run: |
          python -m pip install -v --no-build-isolation .
      - name: ccache statistics
        if: always()
        run: ccache --show-stats
      - name: Run Skimage2 migration doctests
        run: |
          python doc/tools/run_migration_doctests.py
      - name: Push docs
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${DEPLOY_KEY}"
          # See https://github.community/t/github-actions-bot-email-address/17204/5
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"
          (cd doc && make html)
          git clone --quiet --branch=gh-pages "${GH_REF}" doc_build
          cd doc_build
          git rm -r dev
          cp -r ../doc/build/html dev
          git add dev
          git commit -m "Deployed to GitHub Pages"
          git push --force --quiet "${GH_REF}" gh-pages
        env:
          GH_REF: git@github.com:scikit-image/docs.git
          DEPLOY_KEY: ${{ secrets.DOC_DEPLOY_KEY_PRIVATE }}
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
      - name: Store docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: doc/build/html
